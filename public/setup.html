<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thiết lập Tingee × Haravan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 40px 16px 60px;
    }

    .container { max-width: 560px; margin: 0 auto; }

    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; }
    .page-header p { margin-top: 6px; color: #6b7280; font-size: 0.9rem; line-height: 1.5; }

    /* Step card */
    .step-card {
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 14px;
      transition: border-color 0.2s, opacity 0.2s;
    }
    .step-card.done   { border-color: #22c55e; }
    .step-card.locked { opacity: 0.4; pointer-events: none; user-select: none; }

    .step-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .step-badge {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #e5e7eb;
      color: #6b7280;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }
    .step-card.done .step-badge { background: #22c55e; color: #fff; }
    .step-title { font-weight: 600; font-size: 0.95rem; flex: 1; }
    .step-checkmark { color: #22c55e; font-size: 1.1rem; display: none; }
    .step-card.done .step-checkmark { display: block; }

    /* Inputs */
    .field { margin-bottom: 14px; }
    .field:last-of-type { margin-bottom: 0; }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
    }
    input, select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }
    input:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    input::placeholder { color: #9ca3af; }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      padding: 10px 22px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover  { background: #4f46e5; }
    .btn:active { background: #4338ca; }

    /* Error */
    .error-msg {
      margin-top: 10px;
      min-height: 18px;
      font-size: 0.83rem;
      color: #dc2626;
    }

    /* Success banner */
    #successBanner {
      display: none;
      margin-top: 20px;
      background: #f0fdf4;
      border: 2px solid #22c55e;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    #successBanner .icon { font-size: 2.2rem; margin-bottom: 8px; }
    #successBanner h2 { font-size: 1rem; color: #166534; margin-bottom: 4px; }
    #successBanner p  { font-size: 0.85rem; color: #4b7a56; }
  </style>
</head>
<body>
  <div class="container">

    <div class="page-header">
      <h1>Thiết lập Tingee × Haravan</h1>
      <p>Hoàn thành 3 bước để bật xác nhận thanh toán QR tự động cho cửa hàng của bạn.</p>
    </div>

    <!-- Step 1 — Haravan -->
    <div class="step-card" id="step1">
      <div class="step-header">
        <div class="step-badge">1</div>
        <span class="step-title">Kết nối Haravan</span>
        <span class="step-checkmark">✓</span>
      </div>
      <div class="field">
        <label for="shopDomain">Shop domain</label>
        <input id="shopDomain" type="text" placeholder="ten-cua-hang.myharavan.com" autocomplete="off">
      </div>
      <div class="field">
        <label for="apiToken">Haravan API Token</label>
        <input id="apiToken" type="password" placeholder="Dán token từ Private App">
      </div>
      <button class="btn" onclick="confirmStep1()">Xác nhận</button>
      <div class="error-msg" id="error1"></div>
    </div>

    <!-- Step 2 — Tingee -->
    <div class="step-card locked" id="step2">
      <div class="step-header">
        <div class="step-badge">2</div>
        <span class="step-title">Kết nối Tingee</span>
        <span class="step-checkmark">✓</span>
      </div>
      <div class="field">
        <label for="clientId">Client ID</label>
        <input id="clientId" type="text" placeholder="Tingee Client ID" autocomplete="off">
      </div>
      <div class="field">
        <label for="secretToken">Secret Token</label>
        <input id="secretToken" type="password" placeholder="Tingee Secret Token">
      </div>
      <button class="btn" onclick="confirmStep2()">Lấy danh sách tài khoản</button>
      <div class="error-msg" id="error2"></div>
    </div>

    <!-- Step 3 — Account -->
    <div class="step-card locked" id="step3">
      <div class="step-header">
        <div class="step-badge">3</div>
        <span class="step-title">Chọn tài khoản nhận tiền</span>
        <span class="step-checkmark">✓</span>
      </div>
      <div class="field">
        <label for="account">Tài khoản ngân hàng</label>
        <select id="account">
          <option value="">-- Chọn tài khoản --</option>
        </select>
      </div>
      <button class="btn" onclick="confirmStep3()">Hoàn tất thiết lập</button>
      <div class="error-msg" id="error3"></div>
    </div>

    <!-- Success -->
    <div id="successBanner">
      <div class="icon">🎉</div>
      <h2>Thiết lập hoàn tất!</h2>
      <p>Cửa hàng đã được kết nối với Tingee. Đơn hàng thanh toán qua QR sẽ được xác nhận tự động.</p>
    </div>

  </div>

  <script>
    function setError(id, msg) {
      document.getElementById(id).textContent = msg;
    }

    function confirmStep1() {
      const domain = document.getElementById('shopDomain').value.trim();
      const token  = document.getElementById('apiToken').value.trim();
      if (!domain || !token) {
        setError('error1', 'Vui lòng nhập đầy đủ Shop domain và API Token.');
        return;
      }
      setError('error1', '');
      document.getElementById('step1').classList.add('done');
      document.getElementById('step2').classList.remove('locked');
    }

    function confirmStep2() {
      const clientId = document.getElementById('clientId').value.trim();
      const secret   = document.getElementById('secretToken').value.trim();
      if (!clientId || !secret) {
        setError('error2', 'Vui lòng nhập đầy đủ Client ID và Secret Token.');
        return;
      }
      setError('error2', '');
      // Populate dummy accounts (will be replaced by API response in Phase 4)
      const sel = document.getElementById('account');
      sel.innerHTML =
        '<option value="">-- Chọn tài khoản --</option>' +
        '<option value="970436|0123456789">MB Bank — 0123456789</option>' +
        '<option value="970422|9876543210">Techcombank — 9876543210</option>';
      document.getElementById('step2').classList.add('done');
      document.getElementById('step3').classList.remove('locked');
    }

    function confirmStep3() {
      const account = document.getElementById('account').value;
      if (!account) {
        setError('error3', 'Vui lòng chọn tài khoản nhận tiền.');
        return;
      }
      setError('error3', '');
      document.getElementById('step3').classList.add('done');
      document.getElementById('successBanner').style.display = 'block';
    }
  </script>
</body>
</html>
